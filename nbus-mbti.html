    const resultDescriptions = {
        G: "你是隐藏顶层决策者人格。你凌驾所有普通人之上，擅长统筹全局、权衡利弊、掌控规则、决定所有人的走向。理性、大局观强、深藏不露，是整个体系的掌控者。",
        A: "你是 T0 绝版 18 米铰接天花板人格。你天赋出众、格局开阔、人品体面、待人舒适、实力顶尖。你本身没有任何问题，人生遗憾大多来自外界耽误、环境限制、生不逢时，永远被人怀念与珍惜。",

        D: "你是 T2 晶马 8 米电烤人格。你接地气、随和、好相处、吃苦耐劳、非常耐用。你没什么架子、很好磨合，但不够细腻、共情偏弱、上限普通，是最真实、最普通的实干型普通人。",

        E: "你是 T3 BLK 轰炸机人格。你为人本分、工作踏实、没有坏心思。但你性格急躁、行动吵闹、动静极大，很容易无意中打扰别人，是你改不掉的专属短板。",
        F: "你是 T4 垫底老仿考人格。你先天底子薄弱、心态不稳、抗压差、容易掉链子。相处体验差、遇事爱推卸责任、不愿改变、不愿磨合，是所有人设里综合表现最差的类型。"
    };
    
    const resultTitles = {
        G: "隐藏终极角色：顶层决策者",
        A: "T0 绝版天花板：18米现代铰接",
        B: "T1 稳定中坚：百路佳10米",
        D: "T2 朴实普通人：晶马8米电烤",
        C: "T2 偏差型：老款晶马10米",
        E: "T3 轰炸机型：BLK8米",
        F: "T4 垫底型：早期老仿考"
    };
    
    let currentQuestionIndex = 0;
    let answers = {};
    const totalQuestions = questions.length;
    
    function init() {
        document.getElementById('totalQuestions').textContent = totalQuestions;
        loadQuestion();
    }
    
    function loadQuestion() {
        const question = questions[currentQuestionIndex];
        
        document.getElementById('currentQuestion').textContent = currentQuestionIndex + 1;
        document.getElementById('progressFill').style.width = ((currentQuestionIndex + 1) / totalQuestions * 100) + '%';
        document.getElementById('questionNumber').textContent = '第 ' + (currentQuestionIndex + 1) + ' 题';
        document.getElementById('questionText').textContent = question.question;
        
        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';
        
        question.options.forEach(function(option) {
            const optionDiv = document.createElement('div');
            optionDiv.className = 'option' + (answers[currentQuestionIndex] === option.letter ? ' selected' : '');
            optionDiv.onclick = function() { selectOption(option.letter); };
            
            const letterDiv = document.createElement('div');
            letterDiv.className = 'option-letter';
            letterDiv.textContent = option.letter;
            
            const textDiv = document.createElement('div');
            textDiv.className = 'option-text';
            textDiv.textContent = option.text;
            
            optionDiv.appendChild(letterDiv);
            optionDiv.appendChild(textDiv);
            optionsContainer.appendChild(optionDiv);
        });
        
        updateNavButtons();
    }
    
    function selectOption(letter) {
        answers[currentQuestionIndex] = letter;
        
        document.querySelectorAll('.option').forEach(function(opt) {
            opt.classList.remove('selected');
            if (opt.querySelector('.option-letter').textContent === letter) {
                opt.classList.add('selected');
            }
        });
        
        updateNavButtons();
    }
    
    function updateNavButtons() {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        prevBtn.disabled = currentQuestionIndex === 0;
        
        if (currentQuestionIndex === totalQuestions - 1) {
            nextBtn.textContent = '查看结果';
            nextBtn.disabled = !answers[currentQuestionIndex];
        } else {
            nextBtn.textContent = '下一题';
            nextBtn.disabled = !answers[currentQuestionIndex];
        }
    }
    
    function nextQuestion() {
        if (currentQuestionIndex === totalQuestions - 1) {
            showResult();
        } else {
            currentQuestionIndex++;
            loadQuestion();
        }
    }
    
    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }
    
    function calculateResult() {
        const counts = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, G: 0 };
        
        Object.values(answers).forEach(function(letter) {
            if (counts.hasOwnProperty(letter)) {
                counts[letter]++;
            }
        });
        
        const priority = ['G', 'A', 'B', 'D', 'C', 'E', 'F'];
        let maxCount = 0;
        priority.forEach(function(letter) {
            if (counts[letter] > maxCount) {
                maxCount = counts[letter];
            }
        });
        
        let result = 'F';
        priority.forEach(function(letter) {
            if (counts[letter] === maxCount) {
                result = letter;
            }
        });
        
        return { result: result, counts: counts };
    }
    
    function showResult() {
        const resultData = calculateResult();
        const result = resultData.result;
        const counts = resultData.counts;
        
        document.getElementById('questionContainer').style.display = 'none';
        document.querySelector('.nav-buttons').style.display = 'none';
        document.querySelector('.mbti-header .progress-text').style.display = 'none';
        
        const resultContainer = document.getElementById('resultContainer');
        resultContainer.classList.add('show');
        
        const badge = document.getElementById('resultBadge');
        badge.textContent = result;
        badge.className = 'result-badge ' + result;
        
        document.getElementById('resultTitle').textContent = resultTitles[result];
        document.getElementById('resultSubtitle').textContent = '你的车型人格是：' + result;
        
        const statsContainer = document.getElementById('statsContainer');
        statsContainer.innerHTML = '';
        ['G', 'A', 'B', 'D', 'C', 'E', 'F'].forEach(function(letter) {
            const statItem = document.createElement('div');
            statItem.className = 'stat-item';
            statItem.textContent = letter + ': ' + counts[letter] + '次';
            statsContainer.appendChild(statItem);
        });
        
        document.getElementById('resultDescription').textContent = resultDescriptions[result];
    }
    
    function restartTest() {
        currentQuestionIndex = 0;
        answers = {};
        
        document.getElementById('resultContainer').classList.remove('show');
        document.getElementById('questionContainer').style.display = 'block';
        document.querySelector('.nav-buttons').style.display = 'flex';
        document.querySelector('.mbti-header .progress-text').style.display = 'block';
        
        loadQuestion();
    }
    
    window.onload = function() {
        init();
    };
    </script>
